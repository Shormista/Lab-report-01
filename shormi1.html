<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <link rel="stylesheet" href="shormi_1.css">
</head>

<body>
    <h1>Student Registration Form</h1>
    <form>
        <label>Full Name:</label>
        <input type="text" placeholder="Enter name" required>
        <br><br>
        <label>Email:</label>
        <input type="email" placeholder="Enter email" required>
        <br><br>
        <label>Phone:</label>
        <input type="tel" placeholder="Enter phone">
        <br><br>
        <label>Department:</label>
        <select>
            <option>CSE</option>
            <option>SWE</option>
            <option>EEE</option>
            <option>BBA</option>
        </select>
        <br><br>
        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>
        <label>Semester:</label>
        <input type="text" placeholder="Enter Semester (e.g., 5th)" required>
        <br><br>
        <input type="submit" value="Register">
        <input type="reset" value="Clear">
    </form>
    <h2>Registered Students</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
        </tr>
        <tr>
            <td>001</td>
            <td>John Doe</td>
            <td>CSE</td>
        </tr>
        <tr>
            <td>002</td>
            <td>Jane Smith</td>
            <td>SWE</td>
        </tr>
        <tr>
            <td>003</td>
            <td>Bob Johnson</td>
            <td>EEE</td>
        </tr>
    </table>
</body>

</html>
